<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neni's App — Verificación</title>
<link rel="stylesheet" href="styles.css">
<style>
    .topnav { display:flex; align-items:center; gap:14px; padding: 4px 22px 0; }
    .back { width:44px; height:44px; border-radius:14px; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow: var(--shadow-sm); }
    .back .material-symbols-rounded { font-size:24px; color:var(--ink); }
    .otp-ico { width:78px; height:78px; border-radius:26px; margin: 26px auto 0; background: linear-gradient(135deg,#ffe1ec,#ffd0e2); display:flex; align-items:center; justify-content:center; box-shadow: var(--shadow); }
    .otp-ico .material-symbols-rounded { font-size:40px; color: var(--neni-deep); }
    .otp { display:flex; gap:11px; justify-content:center; margin-top: 8px; }
    .otp .cell { width:48px; height:60px; border-radius:17px; background:#fff; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:25px; font-weight:700; color:var(--ink); box-shadow: var(--shadow-sm); }
    .otp .cell.on { border-color:var(--neni); box-shadow:0 0 0 3px rgba(251,111,156,.18), var(--shadow-sm); }
    .otp .cell .caret { width:2px; height:28px; background:var(--neni); border-radius:2px; }
    .resend { text-align:center; margin-top:20px; font-size:13.5px; color:var(--ink-2); }
    .resend b { color:var(--ink-3); font-weight:600; }
    .devchip { display:flex; align-items:center; justify-content:center; gap:7px; margin: 18px 22px 0; padding:11px; border-radius:15px; background:#f3ecff; color:#6a4dbb; font-size:12.5px; font-weight:600; }
    .devchip .material-symbols-rounded { font-size:18px; }
</style>
</head>
<body>
<div class="stage">
    <div>
        <div class="phone">
            <div class="screen" style="background:
                radial-gradient(70% 35% at 50% 0%, #ffe9f1 0%, rgba(255,233,241,0) 55%), #fdf4f7;">
                <div class="statusbar">
                    <span>9:41</span>
                    <span class="icons"><span class="material-symbols-rounded">signal_cellular_alt</span><span class="material-symbols-rounded">wifi</span><span class="material-symbols-rounded">battery_full</span></span>
                </div>

                <div class="body">
                    <div class="topnav">
                        <div class="back"><span class="material-symbols-rounded">arrow_back</span></div>
                    </div>

                    <div class="otp-ico"><span class="material-symbols-rounded">sms</span></div>

                    <div style="text-align:center; padding: 18px 30px 0;">
                        <div class="h1">Verifica tu número</div>
                        <div class="sub" style="margin-top:8px;">Escribe el código de 6 dígitos que mandamos por SMS a <b style="color:var(--ink); font-weight:600;">+52 868 ··· 90</b></div>
                        <div style="color:var(--neni-deep); font-size:13px; font-weight:600; margin-top:6px;">Cambiar número</div>
                    </div>

                    <div class="pad" style="margin-top: 26px;">
                        <div class="otp">
                            <div class="cell">1</div>
                            <div class="cell">2</div>
                            <div class="cell">4</div>
                            <div class="cell on"><span class="caret"></span></div>
                            <div class="cell"></div>
                            <div class="cell"></div>
                        </div>

                        <div class="resend">Reenvía el código en <b>0:42</b></div>

                        <div class="devchip">
                            <span class="material-symbols-rounded">construction</span>
                            Modo prueba — usa el código 000000
                        </div>
                    </div>
                </div>

                <div style="padding: 0 22px 26px;">
                    <button class="btn btn-primary">Verificar <span class="material-symbols-rounded">check</span></button>
                </div>
            </div>
        </div>
        <div class="label">④ Verificación OTP</div>
    </div>
</div>
</body>
</html>
